<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPCタイマー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        body.green { background-color: #4CAF50; }
        body.yellow { background-color: #FFC107; }
        body.red { background-color: #f44336; }
        body.black { background-color: #000000; }

        .timer-container {
            text-align: center;
            padding: 20px;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .timer-display {
            font-size: min(40vw, 500px);
            font-weight: bold;
            color: white;
            text-shadow: 6px 6px 12px rgba(0, 0, 0, 0.4);
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            font-size: 28px;
            padding: 12px;
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.8);
            color: #333;
            box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: rgba(255, 255, 255, 0.95);
            transform: scale(1.1);
            box-shadow: 3px 3px 12px rgba(0, 0, 0, 0.4);
        }

        button:active {
            transform: scale(1.05);
        }

        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .settings-panel.active {
            display: block;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .settings-panel h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .setting-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        .setting-group input[type="number"],
        .setting-group input[type="file"],
        .setting-group input[type="checkbox"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .setting-group input[type="number"],
        .setting-group input[type="file"] {
            width: 100%;
        }

        .setting-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .bell-settings {
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .bell-item {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .bell-item input {
            flex: 1;
        }

        .bell-item .time-input {
            flex: 2;
        }

        .bell-item button {
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 5px;
            width: auto;
            height: auto;
        }

        .add-bell-btn {
            margin-top: 10px;
            font-size: 16px;
            padding: 10px 20px;
        }

        .settings-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .settings-buttons button {
            font-size: 18px;
            padding: 12px 24px;
            border-radius: 8px;
            width: auto;
            height: auto;
        }

        .add-bell-btn {
            border-radius: 8px;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body class="green">
    <div class="timer-container">
        <div class="timer-display" id="timerDisplay">3:00</div>
    </div>
    
    <div class="controls">
        <button id="startBtn" title="開始">▶️</button>
        <button id="resetBtn" title="リセット">🔄</button>
        <button id="bellBtn" title="ベル">🔔</button>
        <button id="settingsBtn" title="設定">⚙️</button>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <h2>タイマー設定</h2>
        
        <div class="setting-group">
            <label for="totalTime">総時間（秒）:</label>
            <input type="number" id="totalTime" value="180" min="1">
        </div>

        <div class="setting-group">
            <label>予備鈴設定:</label>
            <div class="bell-settings" id="bellSettings"></div>
            <button class="add-bell-btn" id="addBellBtn">+ 予備鈴を追加</button>
        </div>

        <div class="setting-group">
            <label for="audioFile">カスタム音声ファイル（オプション）:</label>
            <input type="file" id="audioFile" accept="audio/*">
        </div>

        <div class="setting-group">
            <label class="checkbox-label">
                <input type="checkbox" id="autoRestart" checked>
                <span>リセット後すぐに再開する</span>
            </label>
        </div>

        <div class="settings-buttons">
            <button id="cancelBtn">キャンセル</button>
            <button id="saveBtn">保存</button>
        </div>
    </div>

    <script>
        class Timer {
            constructor() {
                this.totalSeconds = 180;
                this.remainingSeconds = 180;
                this.isRunning = false;
                this.intervalId = null;
                this.bellTimes = [{time: 60, count: 1}, {time: 30, count: 1}]; // デフォルト: 1分前1回、30秒前1回
                this.bellRung = new Set();
                this.customAudio = null;
                this.audioContext = null;
                this.blinkIntervalId = null;
                this.autoRestart = true; // デフォルト: リセット後すぐに再開

                this.loadSettings();
                this.initElements();
                this.initAudioContext();
                this.updateDisplay();
                this.updateBackgroundColor();
            }

            initElements() {
                this.display = document.getElementById('timerDisplay');
                this.startBtn = document.getElementById('startBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.bellBtn = document.getElementById('bellBtn');
                this.settingsBtn = document.getElementById('settingsBtn');
                this.overlay = document.getElementById('overlay');
                this.settingsPanel = document.getElementById('settingsPanel');
                this.saveBtn = document.getElementById('saveBtn');
                this.cancelBtn = document.getElementById('cancelBtn');
                this.totalTimeInput = document.getElementById('totalTime');
                this.audioFileInput = document.getElementById('audioFile');
                this.bellSettings = document.getElementById('bellSettings');
                this.addBellBtn = document.getElementById('addBellBtn');
                this.autoRestartCheckbox = document.getElementById('autoRestart');

                this.startBtn.addEventListener('click', () => this.toggleTimer());
                this.resetBtn.addEventListener('click', () => this.reset());
                this.bellBtn.addEventListener('click', () => this.ringBell(2));
                this.settingsBtn.addEventListener('click', () => this.openSettings());
                this.saveBtn.addEventListener('click', () => this.saveSettings());
                this.cancelBtn.addEventListener('click', () => this.closeSettings());
                this.overlay.addEventListener('click', () => this.closeSettings());
                this.addBellBtn.addEventListener('click', () => this.addBellInput());
                this.audioFileInput.addEventListener('change', (e) => this.loadCustomAudio(e));
            }

            initAudioContext() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            loadSettings() {
                const saved = localStorage.getItem('timerSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    this.totalSeconds = settings.totalSeconds || 180;
                    this.bellTimes = settings.bellTimes || [{time: 60, count: 1}, {time: 30, count: 1}];
                    this.autoRestart = settings.autoRestart !== undefined ? settings.autoRestart : true;
                    this.remainingSeconds = this.totalSeconds;
                }
            }

            saveSettingsToStorage() {
                const settings = {
                    totalSeconds: this.totalSeconds,
                    bellTimes: this.bellTimes,
                    autoRestart: this.autoRestart
                };
                localStorage.setItem('timerSettings', JSON.stringify(settings));
            }

            openSettings() {
                this.totalTimeInput.value = this.totalSeconds;
                this.autoRestartCheckbox.checked = this.autoRestart;
                this.renderBellInputs();
                this.settingsPanel.classList.add('active');
                this.overlay.classList.add('active');
            }

            closeSettings() {
                this.settingsPanel.classList.remove('active');
                this.overlay.classList.remove('active');
            }

            renderBellInputs() {
                this.bellSettings.innerHTML = '';
                this.bellTimes.forEach((bell, index) => {
                    this.addBellInput(bell.time, bell.count, index);
                });
            }

            addBellInput(timeValue = 30, countValue = 1, index = null) {
                const bellItem = document.createElement('div');
                bellItem.className = 'bell-item';
                
                const timeInput = document.createElement('input');
                timeInput.type = 'number';
                timeInput.value = timeValue;
                timeInput.min = '1';
                timeInput.placeholder = '残り時間（秒）';
                timeInput.className = 'time-input';
                
                const countInput = document.createElement('input');
                countInput.type = 'number';
                countInput.value = countValue;
                countInput.min = '1';
                countInput.max = '10';
                countInput.placeholder = '回数';
                
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '削除';
                removeBtn.addEventListener('click', () => bellItem.remove());
                
                bellItem.appendChild(timeInput);
                bellItem.appendChild(countInput);
                bellItem.appendChild(removeBtn);
                this.bellSettings.appendChild(bellItem);
            }

            saveSettings() {
                const newTotalTime = parseInt(this.totalTimeInput.value);
                const bellItems = this.bellSettings.querySelectorAll('.bell-item');
                const newBellTimes = Array.from(bellItems)
                    .map(item => {
                        const inputs = item.querySelectorAll('input[type="number"]');
                        return {
                            time: parseInt(inputs[0].value),
                            count: parseInt(inputs[1].value)
                        };
                    })
                    .filter(bell => !isNaN(bell.time) && !isNaN(bell.count) && bell.time > 0 && bell.count > 0)
                    .sort((a, b) => b.time - a.time); // 時間で降順ソート

                this.totalSeconds = newTotalTime;
                this.bellTimes = newBellTimes;
                this.autoRestart = this.autoRestartCheckbox.checked;
                this.reset();
                this.saveSettingsToStorage();
                this.closeSettings();
            }

            loadCustomAudio(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.audioContext.decodeAudioData(e.target.result, (buffer) => {
                            this.customAudio = buffer;
                        });
                    };
                    reader.readAsArrayBuffer(file);
                }
            }

            playBeep(frequency = 800, duration = 200) {
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration / 1000);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration / 1000);
            }

            playCustomAudio() {
                if (this.customAudio) {
                    const source = this.audioContext.createBufferSource();
                    source.buffer = this.customAudio;
                    source.connect(this.audioContext.destination);
                    source.start(0);
                } else {
                    this.playBeep();
                }
            }

            async ringBell(times = 1) {
                for (let i = 0; i < times; i++) {
                    this.playCustomAudio();
                    if (i < times - 1) {
                        await new Promise(resolve => setTimeout(resolve, 500));
                    }
                }
            }

            toggleTimer() {
                if (this.isRunning) {
                    this.pause();
                } else {
                    this.start();
                }
            }

            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                this.startBtn.textContent = '⏸️';
                this.startBtn.title = '一時停止';
                
                this.intervalId = setInterval(() => {
                    this.remainingSeconds--;
                    this.updateDisplay();
                    this.updateBackgroundColor();
                    this.checkBells();

                    if (this.remainingSeconds === 0) {
                        this.ringBell(2); // 終了ベル2回
                    }
                }, 1000);
            }

            pause() {
                this.isRunning = false;
                this.startBtn.textContent = '▶️';
                this.startBtn.title = '開始';
                clearInterval(this.intervalId);
                this.stopBlinking();
            }

            reset() {
                this.pause();
                this.remainingSeconds = this.totalSeconds;
                this.bellRung.clear();
                this.updateDisplay();
                this.updateBackgroundColor();
                if (this.autoRestart) {
                    this.start();
                } else {
                    this.startBtn.textContent = '▶️';
                    this.startBtn.title = '開始';
                }
            }

            checkBells() {
                if (this.remainingSeconds > 0) {
                    for (const bell of this.bellTimes) {
                        if (this.remainingSeconds === bell.time && !this.bellRung.has(bell.time)) {
                            this.ringBell(bell.count); // 設定された回数鳴らす
                            this.bellRung.add(bell.time);
                        }
                    }
                }
            }

            updateDisplay() {
                const absSeconds = Math.abs(this.remainingSeconds);
                const minutes = Math.floor(absSeconds / 60);
                const seconds = absSeconds % 60;
                const sign = this.remainingSeconds < 0 ? '-' : '';
                this.display.textContent = `${sign}${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            updateBackgroundColor() {
                const body = document.body;
                body.classList.remove('green', 'yellow', 'red', 'black');

                if (this.remainingSeconds < 0) {
                    // 点滅開始
                    this.startBlinking();
                } else {
                    this.stopBlinking();
                    
                    if (this.remainingSeconds <= 15) {
                        body.classList.add('red');
                    } else if (this.bellTimes.length > 0 && this.remainingSeconds <= this.bellTimes[0].time) {
                        body.classList.add('yellow');
                    } else {
                        body.classList.add('green');
                    }
                }
            }

            startBlinking() {
                if (this.blinkIntervalId) return;
                
                let isRed = true;
                this.blinkIntervalId = setInterval(() => {
                    const body = document.body;
                    body.classList.remove('red', 'black');
                    body.classList.add(isRed ? 'red' : 'black');
                    isRed = !isRed;
                }, 1000);
            }

            stopBlinking() {
                if (this.blinkIntervalId) {
                    clearInterval(this.blinkIntervalId);
                    this.blinkIntervalId = null;
                }
            }
        }

        // Initialize timer when page loads
        let timer;
        window.addEventListener('DOMContentLoaded', () => {
            timer = new Timer();
        });
    </script>
</body>
</html>
